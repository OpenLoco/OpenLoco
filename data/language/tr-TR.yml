  1885: "{SMALLFONT}{COLOUR BLACK}Yol bazli tüm insaatlar yol insaati penceresinden yapilir..."
  1886: "{SMALLFONT}{COLOUR BLACK}Otobüs servisi için yeni yollara gerek yok, sadece otobüs duragi yeterli..."
  1887: "{SMALLFONT}{COLOUR BLACK}Otobüsümüz bu yerlesimde bir uçtan diger uca gidecek..."
  1888: "{SMALLFONT}{COLOUR BLACK}Mavi ile vurgulanan alan duragin kapsama alanidir. Kapsama alanindaki bina sayisi arttikça duragi daha fazla yolcu kullanir..."
  1889: "{SMALLFONT}{COLOUR BLACK}Duragin yolcu kabul edip etmedigini kontrol edin, aksi takdirde yolculari indiremezsiniz ve ödeme alamazsiniz. Insaat penceresinin altindaki “Kapsama Alani” yazisina dikkat edin..."
  1890: "{SMALLFONT}{COLOUR BLACK}Konumdan memnunsaniz, duragi insa etmek için sol fare tusuna tiklayin..."
  1891: "{SMALLFONT}{COLOUR BLACK}Ikinci duragi yerlesimin karsi tarafina insa edecegiz..."
  1892: "{SMALLFONT}{COLOUR BLACK}Simdi bir otobüs satin almamiz gerekiyor..."
  1893: "{SMALLFONT}{COLOUR BLACK}Iki otobüs tipi arasindan seçim yapabiliriz. Daha fazla yolcu tasiyan yeni tasarimi seçelim..."
  1894: "{SMALLFONT}{COLOUR BLACK}Otobüsü yola yerlestirmek için fare imlecini konumlandirin ve sol tiklayin..."
  1895: "{SMALLFONT}{COLOUR BLACK}Otobüsü çalistirmadan önce nereye gidecegini bilmesi gerekiyor. Araç penceresindeki güzergah sekmesini seçin..."
  1896: "{SMALLFONT}{COLOUR BLACK}Güzergahi ayarlamak için sadece görünümdeki duraklara tiklayin..."
  1897: "{SMALLFONT}{COLOUR BLACK}Artik otobüsü çalistirabiliriz..."
  1898: "{SMALLFONT}{COLOUR BLACK}Ilk yolcularini almasini izleyelim..."

  # Egitim 2
  1899: "{SMALLFONT}{COLOUR BLACK}Boulder Bay ve Breakers Bridge arasinda yolcu tasimak için bir otobüs servisi kuracagiz. Yerlesimler arasinda yol olmadigindan bir yol insa etmemiz gerekiyor..."
  1900: "{SMALLFONT}{COLOUR BLACK}Yeni yol kesitinin yönünü seçin ve insaata baslamak için görünümde bir noktaya tiklayin..."
  1901: "{SMALLFONT}{COLOUR BLACK}'Bunu insa et' simgesine tiklamak ayni türden daha fazla yol kesiti ekler..."
  1902: "{SMALLFONT}{COLOUR BLACK}Devam etmeden önce, yol insaatina baslamanin daha hizli bir yolunu gösterelim..."
  1903: "{SMALLFONT}{COLOUR BLACK}Uzatmak istediginiz yolun sonuna sag tiklayin..."
  1904: "{SMALLFONT}{COLOUR BLACK}Burada sola dönmemiz gerekiyor, bu yüzden sol dönüs egrisini seçin..."
  1905: "{SMALLFONT}{COLOUR BLACK}Simdi tekrar düz yol insa ediyoruz..."
  1906: "{SMALLFONT}{COLOUR BLACK}Yol tamamlandi, simdi duraklar kurulmali..."
  1907: "{SMALLFONT}{COLOUR BLACK}Son olarak bir otobüs satin alip çalistiracagiz..."
  1908: "{SMALLFONT}{COLOUR BLACK}Bu hat oldukça yogun olabilir, bu yüzden ikinci bir otobüs daha alacagiz..."
  1909: "{SMALLFONT}{COLOUR BLACK}Otobüs 2'ye Otobüs 1'in tüm güzergahini kopyalamak için sadece Otobüs 1'in 'güzergah sonu' yazisina tiklayin..."

  # Egitim 3
  1910: "{SMALLFONT}{COLOUR BLACK}Iki büyük yerlesim arasinda yolcu tasimak için tren servisi kurarak baslayalim..."
  1911: "{SMALLFONT}{COLOUR BLACK}Tren istasyonlari sadece düz raylara kurulabilir ve trenimizin uzunluguna uygun olmalidir – Birkaç dakika içinde buraya bir istasyon kuracagiz..."
  1912: "{SMALLFONT}{COLOUR BLACK}Simdi istasyonlari insa ediyoruz..."
  1913: "{SMALLFONT}{COLOUR BLACK}Simdi treni insa edecegiz. Lokomotif ve yolcu vagonlarina ihtiyacimiz olacak..."
  1914: "{SMALLFONT}{COLOUR BLACK}Ray hatti tek yönlü oldugundan güzergah belirlemeye gerek yok – Sadece treni baslatin..."
  1915: "{SMALLFONT}{COLOUR BLACK}Rayi üçüncü yerlesime gidecek sekilde bir kavsakla uzatalim. Ray üzerine sag tiklamak, kavsak insa penceresini açar..."
  1916: "{SMALLFONT}{COLOUR BLACK}Artik ray düzeni basit olmadigindan trenimize bir güzergah vermemiz gerekiyor..."
  1917: "{SMALLFONT}{COLOUR BLACK}Simdi ikinci bir tren ekleyebiliriz ama önce tren çarpismalarini önlemek için sinyaller kurmamiz gerekiyor..."
  1918: "{SMALLFONT}{COLOUR BLACK}Sinyaller rayi 3 ayri 'blok bölgesine' ayirir ve her seferinde sadece bir tren her bloga girebilir..."

